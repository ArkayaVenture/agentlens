<style>

  .node rect{rx:9} text{font:11px sans-serif;fill:#dbe6f5}
  .row{display:flex;gap:10px;padding:9px 10px;border:1px solid var(--line);border-radius:9px;margin-bottom:7px;background:var(--panel2);cursor:pointer}
  .row:hover{border-color:var(--accent)} .row .rn{font-weight:600} .row .rd{color:var(--mut);font-size:12px}
  .pill{font-size:10.5px;padding:1px 8px;border-radius:20px;background:var(--chip);color:var(--cyan);margin-left:6px}
  .feed{display:flex;flex-direction:column;gap:9px;max-height:64vh;overflow:auto}
  .item{border:1px solid var(--line);border-radius:11px;padding:10px 12px;background:var(--panel2)} .item:hover{border-color:var(--accent)}
  .item .h{display:flex;gap:8px;align-items:center;margin-bottom:3px}.item .h .t{font-weight:650}.item .h .src{margin-left:auto;font-size:11px;color:var(--mut)}
  .strat{display:grid;grid-template-columns:repeat(5,1fr);gap:11px}

  .strat .c b{display:block;margin-bottom:5px;color:var(--txt)}
  @media(max-width:1000px){.app{grid-template-columns:1fr}.rail{position:static;height:auto;flex-direction:row;flex-wrap:wrap}.railftr{display:none}.kpis{grid-template-columns:repeat(3,1fr)}.g2,.g3{grid-template-columns:1fr}}
</style>

/* provenance: internal (machine) vs external (web/LLM/cloud) */
const WEBT=new Set(['WebSearch','WebFetch','web_search','web_fetch']);
function classifyTool(name,summary){const n=name||'',low=n.toLowerCase();
  if(WEBT.has(n)||n.startsWith('mcp__')||low.includes('chrome')||low.includes('browser')||low.includes('playwright')||low.includes('tavily')||low.startsWith('web'))return 'external';
  if(n==='Bash')return /(curl |wget |https?:\/\/|npm |npx |pip |git clone|git pull|git push|git fetch|brew |docker (pull|push)|kubectl |aws |gcloud )/.test((summary||'').toLowerCase())?'external':'internal';
  return 'internal';}
function provColor(pct){pct=pct==null?0:pct;const a=[91,140,255],b=[255,159,67];const c=a.map((x,i)=>Math.round(x+(b[i]-x)*pct));return `rgb(${c[0]},${c[1]},${c[2]})`;}
function provBar(intl,ext){const tot=(intl||0)+(ext||0)||1,ep=Math.round((ext||0)/tot*100);
  return `<div style="display:flex;height:12px;border-radius:6px;overflow:hidden;border:1px solid #1e2a3d"><div style="width:${100-ep}%;background:#5b8cff"></div><div style="width:${ep}%;background:#ff9f43"></div></div>
   <div class="muted" style="font-size:11px;margin-top:4px"><span style="color:#5b8cff">■</span> internal (machine) ${100-ep}% &nbsp;·&nbsp; <span style="color:#ff9f43">■</span> external (web/LLM) ${ep}%</div>`;}
const CAT={internal:['#5b8cff','int','internal (machine)'],firm:['#a78bfa','firm','firm MCP'],web:['#ff9f43','web','external web'],llm:['#ff5d6c','llm','external LLM']};
const FIRM_MCP_C=new Set(['atlassian','jira','confluence','skill-marketplace','marvin-cocierge-services','avm-dev','pm-agents-npn','office-memory']);
function classifyTool4(name,summary){const n=name||'',low=n.toLowerCase();
  if(n.startsWith('mcp__')){const s=(n.split('__')[1]||'').toLowerCase();if(FIRM_MCP_C.has(s)||/(marvin|mck|firm|internal|jira|confluence)/.test(s))return 'firm';if(/(openai|gemini|bedrock|perplexity|groq|mistral|llm)/.test(s))return 'llm';if(/(tavily|context7|brave|exa|firecrawl)/.test(s))return 'web';return 'firm';}
  if(WEBT.has(n)||low.startsWith('web')||low.includes('chrome')||low.includes('browser')||low.includes('playwright')||low.includes('tavily'))return 'web';
  if(/(openai|gemini|bedrock|perplexity|groq)/.test(low))return 'llm';
  if(n==='Bash')return /(curl |wget |https?:\/\/|npm |git clone|git pull|git push|brew |docker (pull|push)|aws |gcloud )/.test((summary||'').toLowerCase())?'web':'internal';
  return 'internal';}
function cat4(e){return (['internal','firm','web','llm'].includes(e.origin))?e.origin:classifyTool4(e.tool,e.summary);}

  return `<div style="display:flex;height:14px;border-radius:7px;overflow:hidden;border:1px solid #1e2a3d">${ks.map(k=>`<div title="${CAT[k][2]} ${Math.round((+p[k]||0)/tot*100)}%" style="width:${(+p[k]||0)/tot*100}%;background:${CAT[k][0]}"></div>`).join('')}</div>
   <div class="muted" style="font-size:11px;margin-top:5px">${ks.map(k=>`<span style="color:${CAT[k][0]}">■</span> ${CAT[k][2]} ${Math.round((+p[k]||0)/tot*100)}% <span style="opacity:.6">(${(+p[k]||0)})</span>`).join(' &nbsp; ')}</div>`;}
function feedGraphSVG(items){
  const its=items.filter(i=>i.date).slice().sort((a,b)=>a.date.localeCompare(b.date));
  if(!its.length)return '<p class="muted">No dated feed items yet — the daily loop will populate this.</p>';
  const provs=[...new Set(its.map(i=>i.provider))];
  const dates=[...new Set(its.map(i=>i.date))].sort();
  const padL=120,padT=18,colW=110,rowH=30,r=7;
  const W=padL+Math.max(1,dates.length)*colW+30,H=padT*2+provs.length*rowH+8;
  const xi=d=>padL+dates.indexOf(d)*colW+colW/2,yi=p=>padT+provs.indexOf(p)*rowH+rowH/2;
  const impC=i=>i==='high'?'#ff5d6c':i==='medium'?'#ffb020':'#3fb950';
  let s=`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="font:11px sans-serif">`;
  provs.forEach(p=>{const y=yi(p);s+=`<text x="8" y="${y+4}" fill="#8493a8">${esc((p||'').slice(0,16))}</text><line x1="${padL}" y1="${y}" x2="${W-15}" y2="${y}" stroke="#141d2e"/>`;});
  dates.forEach(d=>{const x=xi(d);s+=`<text x="${x}" y="12" text-anchor="middle" fill="#566479">${esc(d.slice(5))}</text>`;});
  const byProv={};its.forEach(i=>{(byProv[i.provider]=byProv[i.provider]||[]).push(i);});
  Object.values(byProv).forEach(arr=>{for(let k=1;k<arr.length;k++){const a=arr[k-1],b=arr[k];s+=`<line x1="${xi(a.date)}" y1="${yi(a.provider)}" x2="${xi(b.date)}" y2="${yi(b.provider)}" stroke="#2a3850" stroke-width="1.3"/>`;}});

const STRAT={fan:['#5b8cff','fan-out'],tourn:['#22d3ee','tournament'],loop:['#3fb950','loop-until-done'],adv:['#ff5d6c','adversarial'],classify:['#a78bfa','classify-and-act']};
function ultraStrats(s){const bt=s.byTool||{};const keys=Object.keys(bt);const has=re=>keys.some(k=>re.test(k));
  const subs=Math.max(+s.subagentFiles||0,+s.subagentSpawns||0),tools=+s.toolCalls||0;const out=[];
  if(subs>=2)out.push('fan'); if(subs>=3)out.push('tourn');
  if(tools>=25||has(/TodoWrite|TaskCreate/))out.push('loop');
  if(has(/test|review|security|lint|check|verify|Bash/i)&&has(/test|review|security|lint|check|verify/i))out.push('adv');
  else if(has(/test|review|security|lint|verify/i))out.push('adv');
  if(has(/TaskCreate|TodoWrite/))out.push('classify');
  return [...new Set(out)];}

  sl.forEach(s=>{const st=ultraStrats(s);st.forEach(x=>counts[x]++);if(st.length>=2){hybridN++;}});
  const maxc=Math.max(1,...Object.values(counts));
  m.innerHTML=`<h1>ULTRACODE topology</h1><p class="sub">How the doctrine actually shows up in your sessions — detected from sub-agent fan-out, iteration depth, verification steps and task triage. ${LIVE?`<b>${hybridN}</b> of ${sl.length} sessions used a <b>hybrid</b> (≥2) strategy.`:''}</p>

/* ---------------- Workflow Brain (force-directed, heat-mapped, repetition-aware) ---------------- */
const BRAIN={sim:null,pos:{},colorMode:'heat',minRep:2,cap:30,nodes:[],links:[],raw:null};
BRAIN.reload=async function(){
  const stage=document.getElementById('brainStage');if(!stage)return;
  const stat=document.getElementById('bstat');if(stat)stat.textContent='loading sessions…';
  try{
    let sessions=(SESSIONS&&SESSIONS.length)?SESSIONS.slice():await api('/api/sessions');
    sessions=sessions.slice(0,this.cap);
    const details=[];let idx=0;const conc=Math.min(5,sessions.length||1);
    const worker=async()=>{while(idx<sessions.length){const k=idx++;const s=sessions[k];
      try{const d=await api('/api/session?file='+encodeURIComponent(s.file));details.push({s,d});
        if(stat)stat.textContent=`parsed ${details.length}/${sessions.length} sessions`;}catch(e){}}};
    await Promise.all(Array.from({length:conc},worker));
    this.raw={sessions,details};this.build();
  }catch(e){stage.innerHTML='<p class="muted" style="padding:18px">Could not build the brain. Try ↻ Re-pulse, or check the server.</p>';}
};
BRAIN.build=function(){
  if(!this.raw)return;
  const details=this.raw.details;
  const times=details.map(x=>Date.parse(x.s.lastTs||0)).filter(Boolean);
  const tmin=times.length?Math.min.apply(null,times):0, tmax=times.length?Math.max.apply(null,times):1;
  const heat=ts=>{const t=Date.parse(ts||0);if(!t||tmax===tmin)return .5;return (t-tmin)/(tmax-tmin);};
  const nodes=[],links=[],byId={};
  const add=n=>{if(!byId[n.id]){byId[n.id]=n;nodes.push(n);}return byId[n.id];};
  const sigMap={};
  details.forEach(({s,d})=>{(d.timeline||[]).filter(e=>e.kind==='tool_use').forEach(e=>{
    const sig=(e.tool||'tool')+'|'+(e.summary||'');
    const mm=sigMap[sig]||(sigMap[sig]={sig,tool:e.tool,label:e.summary||e.tool,count:0,sessions:{},errors:0,lastTs:''});
    mm.count++;mm.sessions[s.file]=(mm.sessions[s.file]||0)+1;if(e.status==='error')mm.errors++;if((s.lastTs||'')>mm.lastTs)mm.lastTs=s.lastTs;});});
  const projSeen={};
  details.forEach(({s,d})=>{
    const p=s.project||'(unknown)',pid='p:'+p;
    if(!projSeen[pid]){projSeen[pid]=1;add({id:pid,type:'project',label:p,heat:heat(s.lastTs),r:13});}
    else{byId[pid].heat=Math.max(byId[pid].heat,heat(s.lastTs));}
    const sid='s:'+s.file;
    const tools=(+s.toolCalls)||((d.tools||[]).reduce((a,b)=>a+(b.count||0),0));
    let pi=0,pe=0;(d.timeline||[]).forEach(e=>{if(e.kind==='tool_use'){((e.origin||classifyTool(e.tool,e.summary))==='external')?pe++:pi++;}});
    const extPct=(pi+pe)?pe/(pi+pe):(+s.extPct||0);
    add({id:sid,type:'session',label:(s.sessionId||'').slice(0,8)||'session',file:s.file,heat:heat(s.lastTs),extPct:extPct,live:!!s.live,source:s.source,
         r:6+Math.sqrt((tools||1))*1.4,tools:tools,tokens:(+s.tokensInTotal||0)+(+s.tokensOut||0),sub:+s.subagentFiles||0,lastTs:s.lastTs,project:p});
    links.push({source:pid,target:sid,type:'has'});
  });
  const sigs=Object.values(sigMap).filter(mm=>mm.count>=this.minRep).sort((a,b)=>b.count-a.count).slice(0,80);
  sigs.forEach(mm=>{
    const tid='t:'+mm.sig;
    add({id:tid,type:'task',label:mm.label,tool:mm.tool,count:mm.count,reuse:Object.keys(mm.sessions).length,errors:mm.errors,heat:heat(mm.lastTs),extPct:classifyTool(mm.tool)==='external'?1:0,r:6+Math.sqrt(mm.count)*3});
    Object.keys(mm.sessions).forEach(f=>{if(byId['s:'+f])links.push({source:'s:'+f,target:tid,type:'did',w:mm.sessions[f]});});
  });
  const stat=document.getElementById('bstat');
  if(stat)stat.textContent=`${nodes.filter(n=>n.type==='session').length} sessions · ${nodes.filter(n=>n.type==='project').length} workflows · ${sigs.length} repeated tasks`;
  this.nodes=nodes;this.links=links;this.draw();
};
BRAIN.draw=function(){
  const stage=document.getElementById('brainStage');if(!stage||typeof d3==='undefined')return;
  const W=stage.clientWidth||900,H=stage.clientHeight||600;stage.innerHTML='';
  const svg=d3.select(stage).append('svg').attr('width',W).attr('height',H).style('display','block');
  const g=svg.append('g');
  svg.call(d3.zoom().scaleExtent([0.2,4]).on('zoom',ev=>g.attr('transform',ev.transform)));
  this.nodes.forEach(n=>{const p=this.pos[n.id];if(p){n.x=p.x;n.y=p.y;}});
  const link=g.append('g').selectAll('line').data(this.links).join('line')
     .attr('stroke',d=>d.type==='did'?'#3d4f74':'#26324a').attr('stroke-opacity',.6)
     .attr('stroke-width',d=>d.type==='did'?Math.min(4,1+(d.w||1)*0.5):1.1);
  const node=g.append('g').selectAll('g').data(this.nodes,d=>d.id).join('g').style('cursor','pointer')
     .call(d3.drag().on('start',dS).on('drag',dM).on('end',dE))
     .on('click',(ev,d)=>BRAIN.click(d)).on('mousemove',(ev,d)=>BRAIN.tip(ev,d)).on('mouseleave',()=>BRAIN.tip(null));
  node.append('circle').attr('r',d=>d.r).attr('fill',d=>BRAIN.color(d))
     .attr('stroke',d=>d.type==='task'?'#ffffff66':'#ffffff22').attr('stroke-width',d=>d.type==='task'?1.5:1)
     .style('filter','drop-shadow(0 0 5px rgba(120,160,255,.22))');
  node.filter(d=>d.live).append('circle').attr('r',d=>d.r+4).attr('fill','none').attr('stroke','#19c37d').attr('stroke-width',1.6).attr('class','livering').style('pointer-events','none');
  node.filter(d=>d.type==='task'&&d.count>1).append('text').text(d=>d.count).attr('text-anchor','middle').attr('dy',3).attr('font-size',9).attr('font-weight','bold').attr('fill','#0a0e16').style('pointer-events','none');
  node.append('text').text(d=>BRAIN.lbl(d)).attr('x',d=>d.r+4).attr('dy',4).attr('font-size',10).attr('fill','#cdd7e6').style('pointer-events','none');
  this.sim=d3.forceSimulation(this.nodes)
     .force('link',d3.forceLink(this.links).id(d=>d.id).distance(d=>d.type==='did'?70:42).strength(.4))
     .force('charge',d3.forceManyBody().strength(-150))
     .force('center',d3.forceCenter(W/2,H/2))
     .force('collide',d3.forceCollide().radius(d=>d.r+4))
     .on('tick',()=>{link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
       node.attr('transform',d=>`translate(${d.x},${d.y})`);this.nodes.forEach(n=>this.pos[n.id]={x:n.x,y:n.y});});
  function dS(ev,d){if(!ev.active)BRAIN.sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y;}
  function dM(ev,d){d.fx=ev.x;d.fy=ev.y;}
  function dE(ev,d){if(!ev.active)BRAIN.sim.alphaTarget(0);d.fx=null;d.fy=null;}
  this.legend();
};
BRAIN.color=function(d){
  if(this.colorMode==='type')return {project:'#22d3ee',session:'#a78bfa',task:'#ffb020'}[d.type]||'#5b8cff';
  if(this.colorMode==='prov')return provColor(d.extPct==null?0:d.extPct);
  const h=d.heat==null?.5:d.heat,cold=[40,54,80],warm=[255,93,58];
  const c=cold.map((x,i)=>Math.round(x+(warm[i]-x)*h));return `rgb(${c[0]},${c[1]},${c[2]})`;
};
BRAIN.lbl=function(d){if(d.type==='project')return d.label;if(d.type==='task')return (d.label||'').slice(0,24);return '';};
BRAIN.paint=function(){if(typeof d3==='undefined')return;d3.select(document.getElementById('brainStage')).selectAll('circle').attr('fill',d=>BRAIN.color(d));this.legend();};
BRAIN.click=function(d){if(d.type==='session')openSession(encodeURIComponent(d.file));else if(d.type==='task')BRAIN.taskDrawer(d);};
BRAIN.taskDrawer=function(d){
  const ids=this.links.filter(l=>((l.target.id||l.target)===d.id)).map(l=>(l.source.id||l.source));
  document.getElementById('drawer').classList.add('open');document.getElementById('dbg').style.display='block';
  document.getElementById('d-title').innerHTML=`Repeated task <span class="muted">${esc(d.tool||'')}</span>`;
  document.getElementById('d-body').innerHTML=`
    <div class="kpis" style="grid-template-columns:repeat(3,1fr)">${kpi(d.count,'Times executed')}${kpi(d.reuse,'Across sessions')}${kpi(d.errors||0,'Errors')}</div>
    <div class="card" style="margin-bottom:12px"><h3>Signature</h3><div class="rd" style="color:var(--txt);font-family:monospace;word-break:break-all">${esc(d.label)}</div></div>
    <div class="card"><h3>Sessions that ran this <span class="tag">${ids.length}</span></h3>
      ${ids.map(id=>{const n=this.nodes.find(x=>x.id===id);return n?`<div class="row" onclick="openSession('${encodeURIComponent(n.file)}')"><div><div class="rn">${esc(n.project)}</div><div class="rd">${esc(n.label)}</div></div></div>`:'';}).join('')}</div>`;
};
BRAIN.tip=function(ev,d){const t=document.getElementById('brainTip');if(!t)return;if(!ev){t.style.display='none';return;}
  const rect=document.getElementById('brainStage').getBoundingClientRect();let h='';
  if(d.type==='session')h=`<b>${esc(d.project)}</b> · ${esc(d.label)} ${d.live?'<span style="color:#19c37d">● LIVE</span>':''}<br>${esc(d.source||'')} · ${d.tools} tools · ${d.sub} sub · ${fmtK(d.tokens)} tok · ${Math.round((d.extPct||0)*100)}% external<br><span class="muted">${esc((d.lastTs||'').slice(0,16).replace('T',' '))}</span>`;
  else if(d.type==='task')h=`<b>repeated ${d.count}×</b> across ${d.reuse} session(s)${d.errors?` · ${d.errors} err`:''}<br><span class="muted">${esc((d.label||'').slice(0,130))}</span>`;
  else h=`<b>${esc(d.label)}</b> · workflow`;
  t.innerHTML=h;t.style.display='block';t.style.left=(ev.clientX-rect.left+14)+'px';t.style.top=(ev.clientY-rect.top+12)+'px';
};
BRAIN.legend=function(){const l=document.getElementById('brainLegend');if(!l)return;
  if(this.colorMode==='heat')l.innerHTML='<b style="color:#cdd7e6">Heat = recency</b><div style="height:8px;width:150px;border-radius:5px;margin:5px 0;background:linear-gradient(90deg,rgb(40,54,80),rgb(255,93,58))"></div>dormant ⟶ active · <span style="color:#19c37d">◌</span> live · ◯ hub size = repeat count';
  else if(this.colorMode==='prov')l.innerHTML='<b style="color:#cdd7e6">Provenance</b><div style="height:8px;width:150px;border-radius:5px;margin:5px 0;background:linear-gradient(90deg,#5b8cff,#ff9f43)"></div>internal (machine) ⟶ external (web/LLM) · <span style="color:#19c37d">◌</span> live';
  else l.innerHTML='<b style="color:#cdd7e6">Entity</b><br><span style="color:#22d3ee">●</span> workflow &nbsp;<span style="color:#a78bfa">●</span> session &nbsp;<span style="color:#ffb020">●</span> repeated task &nbsp;·&nbsp; <span style="color:#19c37d">◌</span> live';
};

/* ---------------- Topology capability graph (D3) ---------------- */
const TOPO={sim:null};
TOPO.draw=function(){
  const stage=document.getElementById('topoStage');if(!stage||typeof d3==='undefined')return;
  const W=stage.clientWidth||900,H=stage.clientHeight||420;stage.innerHTML='';
  const nodes=[],links=[],by={};
  const add=(id,type,label,ex)=>{if(!by[id]){by[id]=Object.assign({id,type,label},ex||{});nodes.push(by[id]);}return by[id];};
  add('root','root','my-brain',{r:16});
  const SEC=['scout-product-context','synthesize-system-schema','actor-profiling','stride-analysis','dread-ranking','attack-paths','detection-engineering','tabletop-scenarios','security-review','deepsec-scan','api-endpoint-scan'];
  const suite=s=>(s[0].startsWith('threatlens')||SEC.includes(s[0]))?'ThreatLens':s[0].startsWith('mimir')?'Mimir':s[0].startsWith('marvin')?'Marvin':'Standalone';
  add('h:skills','hub','Skills',{r:11});links.push({source:'root',target:'h:skills'});
  const su={};DATA.skills.forEach(s=>{const g=suite(s),sid='suite:'+g;if(!su[g]){su[g]=1;add(sid,'suite',g,{r:9});links.push({source:'h:skills',target:sid});}const k='sk:'+s[0];add(k,'skill',s[0],{r:5});links.push({source:sid,target:k});});
  add('h:agents','hub','Agents',{r:11});links.push({source:'root',target:'h:agents'});
  DATA.agents.forEach(a=>{const k='ag:'+a;add(k,'agent',a,{r:5});links.push({source:'h:agents',target:k});});
  add('h:mcp','hub','MCP',{r:11});links.push({source:'root',target:'h:mcp'});
  DATA.mcp.forEach(x=>{const c=classifyTool4('mcp__'+x[0]+'__t'),k='mc:'+x[0];add(k,'mcp',x[0],{r:6,prov:c});links.push({source:'h:mcp',target:k});});
  add('h:cmd','hub','Commands ×'+DATA.commands.length,{r:11});links.push({source:'root',target:'h:cmd'});
  const col=d=>d.type==='root'?'#22d3ee':d.type==='hub'?'#5b8cff':d.type==='suite'?'#a78bfa':d.type==='mcp'?(CAT[d.prov]?CAT[d.prov][0]:'#ff9f43'):d.type==='agent'?'#3fb950':'#8aa0c0';
  const svg=d3.select(stage).append('svg').attr('width',W).attr('height',H);const g=svg.append('g');
  svg.call(d3.zoom().scaleExtent([0.3,4]).on('zoom',ev=>g.attr('transform',ev.transform)));
  const link=g.append('g').attr('stroke','#26324a').attr('stroke-opacity',.5).selectAll('line').data(links).join('line').attr('stroke-width',1);
  const node=g.append('g').selectAll('g').data(nodes).join('g').style('cursor','grab')
    .call(d3.drag().on('start',(e,d)=>{if(!e.active)TOPO.sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y;}).on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y;}).on('end',(e,d)=>{if(!e.active)TOPO.sim.alphaTarget(0);d.fx=null;d.fy=null;}));
  node.append('circle').attr('r',d=>d.r||5).attr('fill',col).attr('stroke','#ffffff22').style('filter','drop-shadow(0 0 4px rgba(120,160,255,.25))');
  node.filter(d=>['root','hub','suite'].includes(d.type)).append('text').text(d=>d.label).attr('x',d=>(d.r||5)+5).attr('dy',4).attr('font-size',11).attr('fill','#dbe6f5');
  node.append('title').text(d=>d.label);
  TOPO.sim=d3.forceSimulation(nodes)
    .force('link',d3.forceLink(links).id(d=>d.id).distance(d=>['skill','agent','mcp'].includes(d.type)?26:62).strength(.5))
    .force('charge',d3.forceManyBody().strength(-95)).force('center',d3.forceCenter(W/2,H/2))
    .force('collide',d3.forceCollide().radius(d=>(d.r||5)+3))
    .on('tick',()=>{link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);node.attr('transform',d=>`translate(${d.x},${d.y})`);});
};

/* ---------------- charts ---------------- */
function baseOpts(legend){return{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:legend,labels:{color:'#8493a8',boxWidth:12,font:{size:11}}}},scales:legend?{}:{x:{ticks:{color:'#8493a8',font:{size:10}},grid:{color:'#1e2a3d'}},y:{ticks:{color:'#8493a8'},grid:{color:'#1e2a3d'}}}};}
function drawBar(id,labels,data){const c=document.getElementById(id);if(!c)return;if(charts[id])charts[id].destroy();charts[id]=new Chart(c,{type:'bar',data:{labels,datasets:[{data,backgroundColor:'#5b8cff',borderRadius:6}]},options:baseOpts(false)});}
function drawTokens(id,series){const c=document.getElementById(id);if(!c)return;if(charts[id])charts[id].destroy();
  const labels=series.map(d=>(d.date||'').slice(5));
  charts[id]=new Chart(c,{type:'bar',data:{labels,datasets:[
    {label:'in',data:series.map(d=>d.in),backgroundColor:'#5b8cff',borderRadius:4,stack:'t'},
    {label:'out',data:series.map(d=>d.out),backgroundColor:'#22d3ee',borderRadius:4,stack:'t'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,labels:{color:'#8493a8',boxWidth:12,font:{size:11}}}},
      scales:{x:{stacked:true,ticks:{color:'#8493a8',font:{size:10}},grid:{color:'#1e2a3d'}},y:{stacked:true,ticks:{color:'#8493a8'},grid:{color:'#1e2a3d'}}}}});}
function drawDoughnut(id,labels,data,colors){const c=document.getElementById(id);if(!c)return;if(charts[id])charts[id].destroy();charts[id]=new Chart(c,{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:colors||['#5b8cff','#22d3ee','#a78bfa','#ffb020','#3fb950','#ff5d6c','#f472b6','#38bdf8'],borderWidth:0}]},options:baseOpts(true)});}

/* ---------------- theme (day/night) ---------------- */
function applyTheme(t){const light=t==='light';document.body.classList.toggle('light',light);const b=document.getElementById('themeBtn');if(b)b.textContent=light?'☀️ Light':'🌙 Dark';try{localStorage.setItem('mybrain-theme',t);}catch(e){}
  if(curView==='graph'&&BRAIN.sim)BRAIN.draw();}
function toggleTheme(){applyTheme(document.body.classList.contains('light')?'dark':'light');}

/* ---------------- timers ---------------- */
function setupTimer(){if(timer)clearInterval(timer);const on=document.getElementById('auto').checked,iv=+document.getElementById('ivl').value;if(on&&iv>0)timer=setInterval(()=>refreshAll(false),iv*1000);}
document.getElementById('auto').onchange=setupTimer;document.getElementById('ivl').onchange=setupTimer;
setInterval(()=>{document.getElementById('clock').textContent=new Date().toLocaleTimeString();},1000);

/* ---------------- boot ---------------- */
(async()=>{try{applyTheme(localStorage.getItem('mybrain-theme')||'dark');}catch(e){applyTheme('dark');}await refreshAll(false);setupTimer();})();
</script>
