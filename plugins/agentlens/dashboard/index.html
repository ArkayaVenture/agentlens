<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AgentLens · Monitoring</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js"></script>
<style>
:root{
  --bg:#080c15;--bg2:#0b1120;--panel:#101728;--panel2:#0d1422;--line:#1d2942;--line2:#27375a;
  --txt:#e8eef8;--mut:#8a9ab2;--dim:#5e6f8a;--accent:#4d7cfe;--cyan:#2fd0e0;--green:#2ed47a;
  --amber:#f5a623;--red:#f0506e;--viol:#9a7dff;--chip:#13203a;
  --c-local:#4d7cfe;--c-mcp:#9a7dff;--c-web:#f5a623;--c-llm:#f0506e;
  --sh:0 8px 30px rgba(0,8,24,.5);
}
body.light{--bg:#eef2f8;--bg2:#fff;--panel:#fff;--panel2:#f6f8fc;--line:#e2e8f2;--line2:#d4deec;
  --txt:#10203a;--mut:#5b6b82;--dim:#8493a8;--chip:#eef2f8;--sh:0 4px 16px rgba(20,40,80,.08);}
*{box-sizing:border-box}html,body{margin:0;height:100%}
body{font:13.5px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif;background:radial-gradient(1200px 600px at 82% -10%,#0e1830,transparent 55%),var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:var(--line2);border-radius:6px;border:2px solid var(--bg)}::-webkit-scrollbar-thumb:hover{background:#33476f}::selection{background:#4d7cfe55}
a{color:var(--cyan);text-decoration:none}
.app{display:grid;grid-template-columns:218px 1fr;min-height:100vh}
.rail{background:linear-gradient(180deg,var(--bg2),var(--bg));border-right:1px solid var(--line);padding:14px 11px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:3px;overflow:auto}
.brand{display:flex;align-items:center;gap:9px;font-weight:800;letter-spacing:.3px;padding:6px 8px 12px;font-size:15px}
.logo{width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,#4d7cfe,#2fd0e0);display:inline-block;position:relative}
.logo:after{content:"";position:absolute;inset:6px;border-radius:50%;background:var(--bg2)}
.navsec{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);margin:12px 8px 4px}
.nav{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;color:var(--mut);font-weight:600;font-size:13px}
.nav:hover{background:#ffffff08;color:var(--txt)}
.nav{transition:.15s}.nav.on{background:linear-gradient(90deg,#4d7cfe26,#4d7cfe04);color:#fff;box-shadow:inset 3px 0 0 var(--accent)}.nav.on .ico{color:var(--cyan);opacity:1}
.nav .ico{width:16px;text-align:center;opacity:.9}
.railftr{margin-top:auto;border-top:1px solid var(--line);padding-top:10px;display:flex;flex-direction:column;gap:7px;color:var(--mut);font-size:11.5px}
main{padding:18px 22px;overflow:auto;flex:1;min-height:0}
.maincol{display:flex;flex-direction:column;height:100vh;min-width:0}
.appftr{border-top:1px solid var(--line);padding:9px 22px;font-size:11.5px;color:var(--mut);display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;align-items:center;background:linear-gradient(180deg,var(--bg2),var(--bg))}
.appftr a{color:var(--cyan);cursor:pointer}.appftr b{color:var(--txt)}
.rangewrap{display:flex;gap:6px;align-items:center}.rangewrap select{padding:5px 8px}
.head{display:flex;align-items:flex-end;gap:12px;margin-bottom:16px;padding-bottom:13px;border-bottom:1px solid var(--line)}
h1{font-size:21px;margin:0;font-weight:800;letter-spacing:-.2px}.sub{color:var(--mut);font-size:13px;margin:4px 0 0;max-width:760px}
.spacer{flex:1}
.btn{background:var(--chip);border:1px solid var(--line2);color:var(--txt);padding:6px 12px;border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:600}
.btn{transition:.15s}.btn:hover{border-color:var(--accent);background:#16233f}.btn.pri{background:linear-gradient(90deg,#4d7cfe,#2fd0e0);border:0;color:#fff;box-shadow:0 4px 14px #2fd0e033}.btn.pri:hover{filter:brightness(1.08)}
.banner{padding:9px 14px;border-radius:9px;font-size:12.5px;margin-bottom:14px;display:none;align-items:center;gap:9px}
.banner.live{display:flex;background:rgba(46,212,122,.1);color:var(--green);border:1px solid #2ed47a33}
.banner.down{display:flex;background:rgba(245,166,35,.1);color:var(--amber);border:1px solid #f5a62333}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin-bottom:16px}
.kpi{position:relative;background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:13px;padding:14px 15px 13px;box-shadow:var(--sh);overflow:hidden;transition:.18s}
.kpi:hover{border-color:var(--line2);transform:translateY(-1px)}
.kpi:before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--accent),var(--cyan));opacity:.85}
.kpi .v{font-size:25px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.5px;line-height:1.1}
.kpi .l{color:var(--mut);font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;margin-top:3px}
.kpi .d{font-size:11px;margin-top:4px;color:var(--dim)}
.grid{display:grid;gap:14px}.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1.4fr 1fr}
.card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--sh)}
.card h3{margin:0 0 13px;font-size:13.5px;font-weight:700;display:flex;align-items:center;gap:9px;padding-bottom:10px;border-bottom:1px solid var(--line)}
.card h3:before{content:'';width:7px;height:7px;border-radius:2px;background:linear-gradient(135deg,var(--accent),var(--cyan));flex:none}
.card h3 .tag{margin-left:auto;color:var(--dim);font-size:11px;font-weight:500}
.chartbox{position:relative;height:240px}.chartbox.sm{height:170px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th,td{text-align:left;padding:7px 9px;border-bottom:1px solid var(--line);white-space:nowrap}
th{color:var(--mut);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.05em;cursor:pointer;position:sticky;top:0;background:var(--panel2);user-select:none;border-bottom:1px solid var(--line2)}
tbody tr:nth-child(even){background:#ffffff03}tbody tr:hover{background:#4d7cfe14}td.num{text-align:right;font-variant-numeric:tabular-nums}td{transition:.1s}
.tbl-wrap{max-height:64vh;overflow:auto;border:1px solid var(--line);border-radius:10px}
.chip{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px;display:inline-block}
.chip.local{background:#4d7cfe22;color:var(--c-local)}.chip.mcp{background:#9a7dff22;color:var(--c-mcp)}
.chip.web{background:#f5a62322;color:var(--c-web)}.chip.llm{background:#f0506e22;color:var(--c-llm)}
.chip.ext{background:#f0506e1c;color:#ff8aa0}.chip.loc{background:#2ed47a1c;color:var(--green)}.chip.unk{background:#5e6f8a22;color:var(--mut)}
.chip.src{background:#2fd0e022;color:var(--cyan)}.chip.live{background:#2ed47a22;color:var(--green)}
sel,select,input{background:var(--panel);border:1px solid var(--line2);color:var(--txt);padding:7px 10px;border-radius:8px;font-size:12.5px;font-family:inherit}
input[type=search],input[type=text]{min-width:200px}
.row{display:flex;gap:9px;align-items:center;flex-wrap:wrap}
.muted{color:var(--mut)}.dim{color:var(--dim)}
.provbar{display:flex;height:16px;border-radius:8px;overflow:hidden;border:1px solid var(--line2)}
.provleg{display:flex;gap:14px;flex-wrap:wrap;margin-top:9px;font-size:12px}
.provleg b{cursor:pointer}.dotc{width:9px;height:9px;border-radius:2px;display:inline-block;margin-right:5px;vertical-align:middle}
.list .it{display:flex;align-items:center;gap:10px;padding:8px 10px;border:1px solid var(--line);border-radius:9px;margin-bottom:7px;background:var(--panel2)}
.list .it .nm{font-weight:600}.list .it .rt{margin-left:auto;font-variant-numeric:tabular-nums;color:var(--mut)}
.wgrid{display:grid;grid-template-columns:repeat(12,1fr);gap:13px;grid-auto-rows:minmax(40px,auto)}
.widget{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:12px;padding:13px;box-shadow:var(--sh);position:relative;overflow:hidden}
.widget.w4{grid-column:span 4}.widget.w6{grid-column:span 6}.widget.w8{grid-column:span 8}.widget.w12{grid-column:span 12}
.widget .wh{display:flex;align-items:center;gap:7px;margin-bottom:9px;font-size:12.5px;font-weight:600}
.widget .wx{margin-left:auto;display:flex;gap:5px}
.icobtn{cursor:pointer;color:var(--dim);font-size:13px;border:1px solid var(--line2);border-radius:6px;padding:1px 6px;background:var(--chip)}
.icobtn:hover{color:var(--txt);border-color:var(--accent)}
.drawer-bg{position:fixed;inset:0;background:#000b;display:none;z-index:40}
.drawer{position:fixed;top:0;right:0;height:100%;width:min(720px,95vw);background:var(--bg2);border-left:1px solid var(--line2);transform:translateX(100%);transition:.25s;z-index:41;display:flex;flex-direction:column}
.drawer.open{transform:none}.drawer .dh{display:flex;gap:10px;align-items:center;padding:14px 18px;border-bottom:1px solid var(--line)}
.drawer .dh .x{margin-left:auto;cursor:pointer;color:var(--mut);font-size:20px}.drawer .db{padding:16px 18px;overflow:auto}
.qb{display:grid;grid-template-columns:300px 1fr;gap:14px}
.filterrow{display:grid;grid-template-columns:1fr 90px 1fr 28px;gap:6px;margin-bottom:6px}
.empty{padding:38px 30px;text-align:center;color:var(--dim);border:1px dashed var(--line2);border-radius:13px;background:#ffffff03}
.hm{display:grid;gap:2px}.hm .cell{height:18px;border-radius:3px}
.feed .item{border:1px solid var(--line);border-radius:11px;padding:10px 12px;background:var(--panel2);margin-bottom:9px}
@media(max-width:980px){.app{grid-template-columns:1fr}.rail{position:static;height:auto}.g2,.g3,.qb{grid-template-columns:1fr}.widget[class*=w]{grid-column:span 12}}
</style>
</head>
<body>
<div class="app">
  <nav class="rail">
    <div class="brand"><span class="logo"></span> AgentLens</div>
    <div class="navsec">Monitor</div>
    <div class="nav on" data-v="overview"><span class="ico">▦</span> Overview</div>
    <div class="nav" data-v="claude"><span class="ico">✦</span> Claude</div>
    <div class="nav" data-v="cursor"><span class="ico">▶</span> Cursor</div>
    <div class="nav" data-v="platforms"><span class="ico">⧉</span> Platforms</div>
    <div class="navsec">Analyze</div>
    <div class="nav" data-v="provenance"><span class="ico">◈</span> Provenance</div>
    <div class="nav" data-v="topology"><span class="ico">⬡</span> Topology</div>
    <div class="nav" data-v="ultracode"><span class="ico">⚡</span> ULTRACODE</div>
    <div class="navsec">Build</div>
    <div class="nav" data-v="explore"><span class="ico">▤</span> Explore data</div>
    <div class="nav" data-v="query"><span class="ico">⌕</span> Query builder</div>
    <div class="nav" data-v="dashboards"><span class="ico">◳</span> Dashboards</div>
    <div class="nav" data-v="feed"><span class="ico">📡</span> AI Feed</div>
    <div class="navsec">Trust</div>
    <div class="nav" data-v="privacy"><span class="ico">🛡️</span> Privacy</div>
    <div class="railftr">
      <div class="rangewrap"><span class="dim">Range</span><select id="range" onchange="setRange(this.value)"><option value="all">All time</option><option value="24h">Last 24h</option><option value="7d">Last 7 days</option><option value="30d">Last 30 days</option></select></div>
      <label class="row" style="gap:7px"><input type="checkbox" id="auto" checked style="min-width:0"> auto-refresh</label>
      <button class="btn" onclick="toggleTheme()">◐ Theme</button>
      <span id="clock" class="dim"></span>
    </div>
  </nav>
  <div class="maincol"><main id="main"></main><footer id="appftr" class="appftr"></footer></div>
</div>
<div class="drawer-bg" id="dbg" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer"><div class="dh"><b id="dtitle"></b><span class="x" onclick="closeDrawer()">✕</span></div><div class="db" id="dbody"></div></div>
<script>
const PROV={local:['--c-local','#4d7cfe','local (this machine)'],mcp:['--c-mcp','#9a7dff','MCP connectors'],web:['--c-web','#f5a623','external web'],llm:['--c-llm','#f0506e','external LLM']};
const api=async p=>{const r=await fetch(p,{cache:'no-store'});if(!r.ok)throw new Error(r.status);return r.json();};
const post=async(p,b)=>{const r=await fetch(p,{method:'POST',body:JSON.stringify(b)});return r.json();};
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmtK=n=>{n=+n||0;const a=Math.abs(n);return a>=1e9?(n/1e9).toFixed(1)+'B':a>=1e6?(n/1e6).toFixed(1)+'M':a>=1e3?(n/1e3).toFixed(1)+'k':String(Math.round(n));};
const fmtDur=s=>s==null?'–':s<60?s+'s':s<3600?Math.round(s/60)+'m':(s/3600).toFixed(1)+'h';
const ago=ts=>{if(!ts)return'';let d=(Date.now()-(typeof ts==='number'&&ts<1e12?ts*1000:Date.parse(ts)||ts))/1000;if(typeof ts==='number'&&ts>1e12)d=(Date.now()-ts)/1000;return d<60?'just now':d<3600?Math.round(d/60)+'m ago':d<86400?Math.round(d/3600)+'h ago':Math.round(d/86400)+'d ago';};
const cssv=v=>getComputedStyle(document.body).getPropertyValue(v).trim();
let LIVE=false,OVER=null,SESS=[],HEALTH=null,FEED=[],TOPO=null,CURSOR=null,CONFIG={dashboards:[]},DSCACHE={},view='overview',charts={},timer=null;

async function detect(){try{HEALTH=await api('/api/health');LIVE=!!HEALTH.projectsExist;}catch(e){LIVE=false;HEALTH=null;}
  const b=document.getElementById('banner');if(!b)return;
  if(LIVE){b.className='banner live';b.innerHTML=`<span>●</span> LIVE — reading your sessions from <code>${esc(HEALTH.projectsDir)}</code>${HEALTH.pro?' · <b>Pro engine active</b>':''}`;}
  else{b.className='banner down';b.innerHTML='⚠ Server not reachable — run the AgentLens service (port 7717).';}}
async function loadCore(){if(LIVE){try{OVER=await api('/api/overview');}catch(e){OVER=null;}try{SESS=await api('/api/sessions');}catch(e){SESS=[];}try{CONFIG=await api('/api/config')||{};}catch(e){}if(!CONFIG.dashboards)CONFIG.dashboards=[];}
  try{const j=await api('/feed.json');FEED=j.items||[];}catch(e){FEED=[];}}
async function ds(name){if(DSCACHE[name])return DSCACHE[name];const d=await api('/api/dataset?name='+encodeURIComponent(name));DSCACHE[name]=d;return d;}

document.querySelectorAll('.nav').forEach(n=>n.onclick=()=>{document.querySelectorAll('.nav').forEach(x=>x.classList.remove('on'));n.classList.add('on');view=n.dataset.v;DSCACHE={};render();});
async function refresh(){await detect();await loadCore();render();}
function render(){Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});charts={};
  ({overview:vOverview,claude:vClaude,cursor:vCursor,platforms:vPlatforms,provenance:vProv,topology:vTopo,ultracode:vUltra,explore:vExplore,query:vQuery,dashboards:vDash,feed:vFeed,privacy:vPrivacy}[view]||vOverview)();
  const ft=document.getElementById('appftr');if(ft)ft.innerHTML=footerHTML();}

function shell(title,sub,actions){return `<div class="head"><div><h1>${title}</h1><p class="sub">${sub||''}</p></div><div class="spacer"></div>${actions||''}</div><div id="banner" class="banner"></div>`;}
function kpi(v,l,d){return `<div class="kpi"><div class="v">${v}</div><div class="l">${l}</div>${d?`<div class="d">${d}</div>`:''}</div>`;}

/* ---------- charts ---------- */
function mkChart(id,type,labels,datasets,opts){const el=document.getElementById(id);if(!el)return;const grid=cssv('--line'),tick=cssv('--mut');
  const base={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:(datasets.length>1),labels:{color:tick,boxWidth:10,font:{size:10}}}},
   scales:type==='doughnut'||type==='pie'?{}:{x:{ticks:{color:tick,font:{size:10},maxRotation:0,autoSkip:true},grid:{color:grid}},y:{ticks:{color:tick,font:{size:10}},grid:{color:grid}}}};
  charts[id]=new Chart(el,{type:type==='area'?'line':type,data:{labels,datasets},options:Object.assign(base,opts||{})});}
const PAL=['#4d7cfe','#2fd0e0','#9a7dff','#f5a623','#2ed47a','#f0506e','#5ec8ff','#ffa94d'];
function dsStyle(type,i,fill){const c=PAL[i%PAL.length];if(type==='line'||type==='area')return{borderColor:c,backgroundColor:type==='area'?c+'33':c,fill:type==='area',tension:.3,pointRadius:2,borderWidth:2};if(type==='doughnut'||type==='pie')return{backgroundColor:PAL,borderColor:cssv('--panel'),borderWidth:2};return{backgroundColor:c+(fill?'cc':'cc'),borderColor:c,borderWidth:0,borderRadius:4};}

/* ---------- query engine (client-side over datasets) ---------- */
function runQuery(rows,q){let r=rows.slice();(q.filters||[]).forEach(f=>{if(!f.col||f.val==='')return;r=r.filter(row=>{const a=row[f.col],b=f.val;const na=+a,nb=+b;
  switch(f.op){case'=':return String(a)==b;case'!=':return String(a)!=b;case'>':return na>nb;case'<':return na<nb;case'contains':return String(a==null?'':a).toLowerCase().includes(String(b).toLowerCase());default:return true;}});});
  if(q.groupBy){const m={};r.forEach(row=>{const k=row[q.groupBy]==null?'—':row[q.groupBy];const g=m[k]||(m[k]={k,_n:0,_s:0});g._n++;g._s+=(+row[q.aggCol]||0);});
    let g=Object.values(m).map(x=>({label:String(x.k),value:q.agg==='count'?x._n:q.agg==='avg'?(x._n?x._s/x._n:0):x._s}));
    g.sort((a,b)=>b.value-a.value);if(q.limit)g=g.slice(0,q.limit);return{grouped:true,labels:g.map(x=>x.label),values:g.map(x=>Math.round(x.value*100)/100)};}
  return{grouped:false,rows:r};}

/* ============ VIEWS ============ */
function vOverview(){const o=OVER,m=document.getElementById('main');const tk=o&&o.tokens,pv=o&&o.provenance;
  const ins=o?`<b style="color:var(--green)">${o.live}</b> live now · <b>${pv?(pv.extPct*100).toFixed(0):0}%</b> external data · cache hit <b>${tk?(tk.cacheHit*100).toFixed(0):0}%</b>${o.topSessions&&o.topSessions[0]?` · heaviest: <b>${esc(o.topSessions[0].project)}</b>`:''}`:'Start the AgentLens service to see your live activity.';
  m.innerHTML=shell('Overview',ins+(RANGE!=='all'?' · range: '+RANGELBL[RANGE]:''))+`
  <div class="kpis">
   ${kpi(o?o.sessions:'–','Sessions',o&&o.bySource?Object.entries(o.bySource).map(([k,v])=>k+' '+v).join(' · '):'')}
   ${kpi(o&&o.live!=null?`<span style="color:var(--green)">${o.live}</span>`:'–','Live now')}
   ${kpi(o?o.subagents:'–','Sub-agents')}${kpi(o?fmtK(o.toolCalls):'–','Tool calls')}
   ${kpi(tk?fmtK(tk.inTotal):'–','Tokens in')}${kpi(tk?fmtK(tk.out):'–','Tokens out ↑')}
   ${kpi(tk?(tk.cacheHit*100).toFixed(0)+'%':'–','Cache hit')}${kpi(pv?(pv.extPct*100).toFixed(0)+'%':'–','External data')}</div>
   ${pv?`<div class="card" style="margin-bottom:14px"><h3>Data provenance <span class="tag">click a category to drill into contributors</span></h3><div id="provbar"></div></div>`:''}
   ${(o&&o.topSessions&&o.topSessions.length)?`<div class="card" style="margin-bottom:14px"><h3>Where your tokens go <span class="tag">heaviest sessions — click to inspect</span></h3>${o.topSessions.slice(0,8).map(t=>{const mx=o.topSessions[0].tokensTotal||1;return `<div class="row" style="margin-bottom:8px;cursor:pointer" onclick="openSession('${encodeURIComponent(t.file)}')"><div style="width:210px;flex:none"><div style="font-weight:600">${esc(t.project)} ${t.live?'<span style=\'color:var(--green)\'>●</span>':''}</div><div class="dim" style="font-size:11px">${esc(t.source||'')} · ${Math.round((t.extPct||0)*100)}% external</div></div><div style="flex:1;background:var(--panel2);border-radius:6px;overflow:hidden;align-self:center"><div style="height:14px;width:${Math.round((t.tokensTotal||0)/mx*100)}%;background:linear-gradient(90deg,var(--accent),var(--cyan))"></div></div><div style="width:120px;text-align:right;font-variant-numeric:tabular-nums;font-weight:600">${fmtK(t.tokensTotal||0)}</div></div>`;}).join('')}</div>`:''}
   <div class="grid g3"><div class="card"><h3>Token usage <span class="tag">in vs out / day</span></h3><div class="chartbox"><canvas id="cTok"></canvas></div></div>
   <div class="card"><h3>⚡ Optimization ${o&&o.pro?'<span class="chip llm" style="margin-left:auto">Pro</span>':'<span class="tag">basic</span>'}</h3><div id="sugg"></div></div></div>
   <div class="card" style="margin-top:14px"><h3>Recent sessions <span class="tag">click to inspect</span></h3><div class="tbl-wrap" id="recent"></div></div>`;
  if(!o)return;
  if(pv)provBar('provbar',pv,o.provContributors);
  const td=o.tokensByDay||[];mkChart('cTok',(CONFIG.theme,'bar'),td.map(d=>d.date.slice(5)),[

async function qPreview(){const host=document.getElementById('qPrev');if(!host)return;const d=await ds(QB.name);const res=runQuery(d.rows||[],QB);
  if(QB.chart==='table'||!QB.groupBy){const rows=res.grouped?res.labels.map((l,i)=>({key:l,value:res.values[i]})):res.rows.slice(0,200);const cols=res.grouped?['key','value']:(d.columns||[]);
    host.innerHTML=`<div class="tbl-wrap" style="max-height:300px"><table><thead><tr>${cols.map(c=>`<th>${esc(c)}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${cols.map(c=>{let v=r[c];if(Array.isArray(v))v=v.length;return `<td>${esc(v)}</td>`;}).join('')}</tr>`).join('')}</tbody></table></div>`;return;}
  if(QB.chart==='heatmap'){host.innerHTML=heatmapHTML(res.labels,res.values);return;}
  host.innerHTML='<div class="chartbox"><canvas id="qcv"></canvas></div>';
  mkChart('qcv',QB.chart,res.labels,[{label:QB.agg+(QB.aggCol?' '+QB.aggCol:''),data:res.values,...dsStyle(QB.chart,0)}]);}
function heatmapHTML(labels,values){const mx=Math.max(1,...values);const cols=Math.min(12,labels.length)||1;
  return `<div class="hm" style="grid-template-columns:repeat(${cols},1fr)">${values.map((v,i)=>`<div class="cell" title="${esc(labels[i])}: ${v}" style="background:rgba(77,124,254,${.15+.85*v/mx})"></div>`).join('')}</div><div class="dim" style="margin-top:8px;font-size:11px">${labels.length} groups · intensity = value</div>`;}
function saveWidget(){if(!QB.groupBy&&QB.chart!=='table'){alert('Pick a "group by" (or use the table chart) to build a widget.');return;}
  const w={id:'w'+Date.now(),title:QB.title||(QB.name+' · '+(QB.groupBy||'rows')),dataset:QB.name,query:{filters:QB.filters.filter(f=>f.col),groupBy:QB.groupBy,agg:QB.agg,aggCol:QB.aggCol,limit:QB.limit},chart:QB.chart,size:'w6'};
  let dash=(CONFIG.dashboards&&CONFIG.dashboards[0]);if(!dash){dash={id:'default',name:'My dashboard',widgets:[]};CONFIG.dashboards=[dash];}
  dash.widgets.push(w);post('/api/config',CONFIG);document.querySelector('.nav[data-v=dashboards]').click();}

/* ---------- Dashboards (customizable widget grid) ---------- */
async function vDash(){const m=document.getElementById('main');if(!CONFIG.dashboards||!CONFIG.dashboards.length)CONFIG.dashboards=[{id:'default',name:'My dashboard',widgets:[]}];
  const dash=CONFIG.dashboards[0];
  m.innerHTML=shell(esc(dash.name||'Dashboards'),'Your customizable monitoring board — add, resize, reorder, remove.',
    '<button class="btn" onclick="document.querySelector(\'.nav[data-v=query]\').click()">＋ Add widget</button> <button class="btn" onclick="resetDash()">Reset</button>')+
   (dash.widgets.length?`<div class="wgrid" id="wgrid"></div>`:`<div class="empty">No widgets yet. Use the <b>Query builder</b> to create your first widget.<br><button class="btn pri" style="margin-top:10px" onclick="document.querySelector('.nav[data-v=query]').click()">Open Query builder</button></div>`);
  const grid=document.getElementById('wgrid');if(!grid)return;
  for(const[i,w]of dash.widgets.entries()){const el=document.createElement('div');el.className='widget '+(w.size||'w6');el.draggable=true;el.dataset.i=i;
    el.innerHTML=`<div class="wh">${esc(w.title)}<div class="wx"><span class="icobtn" onclick="cycleSize(${i})" title="resize">⤢</span><span class="icobtn" onclick="moveW(${i},-1)">↑</span><span class="icobtn" onclick="moveW(${i},1)">↓</span><span class="icobtn" onclick="delW(${i})">✕</span></div></div><div id="wb${i}" class="wbody"></div>`;
    el.ondragstart=e=>e.dataTransfer.setData('i',i);el.ondragover=e=>e.preventDefault();el.ondrop=e=>{e.preventDefault();reorder(+e.dataTransfer.getData('i'),i);};
    grid.appendChild(el);renderWidget(w,'wb'+i);}}
async function renderWidget(w,host){const d=await ds(w.dataset);const res=runQuery(d.rows||[],w.query);const el=document.getElementById(host);if(!el)return;
  if(w.chart==='table'){const rows=res.grouped?res.labels.map((l,i)=>({key:l,value:res.values[i]})):(res.rows||[]).slice(0,80);const cols=res.grouped?['key','value']:(d.columns||[]).slice(0,5);
    el.innerHTML=`<div class="tbl-wrap" style="max-height:220px"><table><thead><tr>${cols.map(c=>`<th>${esc(c)}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${cols.map(c=>{let v=r[c];if(Array.isArray(v))v=v.length;return`<td>${esc(v)}</td>`;}).join('')}</tr>`).join('')}</tbody></table></div>`;return;}
  if(w.chart==='heatmap'){el.innerHTML=heatmapHTML(res.labels||[],res.values||[]);return;}
  el.innerHTML=`<div class="chartbox sm"><canvas id="${host}c"></canvas></div>`;mkChart(host+'c',w.chart,res.labels||[],[{label:w.query.agg,data:res.values||[],...dsStyle(w.chart,0)}]);}
const SIZES=['w4','w6','w8','w12'];
function cycleSize(i){const d=CONFIG.dashboards[0];const w=d.widgets[i];w.size=SIZES[(SIZES.indexOf(w.size||'w6')+1)%SIZES.length];persist();vDash();}
function moveW(i,dir){const a=CONFIG.dashboards[0].widgets;const j=i+dir;if(j<0||j>=a.length)return;[a[i],a[j]]=[a[j],a[i]];persist();vDash();}
function reorder(from,to){const a=CONFIG.dashboards[0].widgets;const[x]=a.splice(from,1);a.splice(to,0,x);persist();vDash();}
function delW(i){CONFIG.dashboards[0].widgets.splice(i,1);persist();vDash();}
function resetDash(){if(confirm('Remove all widgets?')){CONFIG.dashboards=[{id:'default',name:'My dashboard',widgets:[]}];persist();vDash();}}
function persist(){post('/api/config',CONFIG);}

let RANGE='all';
function setRange(v){RANGE=v;DSCACHE={};render();}
function inRange(ts){if(RANGE==='all')return true;if(!ts)return false;const ms=typeof ts==='number'?(ts<1e12?ts*1000:ts):(Date.parse(ts)||0);const map={'24h':864e5,'7d':6048e5,'30d':2592e6};return (Date.now()-ms)<=(map[RANGE]||Infinity);}
const RANGELBL={all:'all time','24h':'last 24h','7d':'last 7 days','30d':'last 30 days'};
function footerHTML(){return `<div>© 2026 <b>Arkaya Venture Limited</b>, United Kingdom · AgentLens is licensed <a href="https://creativecommons.org/licenses/by-nc/4.0/" target="_blank">CC BY-NC 4.0</a> — attribution required, non-commercial. <a href="https://arkayaventure.com" target="_blank">arkayaventure.com</a></div><div class="dim">🛡️ Local-first · loopback-only · no telemetry — <b style="color:var(--green)">your data never leaves this machine</b>. <a onclick="document.querySelector('.nav[data-v=privacy]').click()">Privacy &amp; conformance →</a></div>`;}

function vFeed(){const m=document.getElementById('main');m.innerHTML=shell('AI Feed','Latest in AI — populated by your scheduled research loops.')+
  `<div class="card feed">${FEED.length?FEED.map(i=>`<div class="item"><div class="row"><span class="chip mcp">${esc(i.provider)}</span><span class="chip ${i.impact==='high'?'llm':i.impact==='medium'?'web':'loc'}">${esc(i.impact)}</span> <b>${esc(i.title)}</b><span class="dim" style="margin-left:auto">${esc(i.date||'')}</span></div><div class="muted" style="margin-top:4px">${esc(i.summary||'')} ${i.url?`· <a href="${esc(i.url)}" target="_blank">source ↗</a>`:''}</div></div>`).join(''):'<div class="empty">No feed items yet — the daily loop will populate this.</div>'}</div>`;}

/* ---------- shared table + drawer + session ---------- */
function tableInto(host,cols,rows,fmt,onclick){const el=document.getElementById(host);if(!el)return;fmt=fmt||{};
  el.innerHTML=`<table><thead><tr>${cols.map(c=>`<th>${esc(c)}</th>`).join('')}</tr></thead><tbody>${(rows||[]).map((r,i)=>`<tr ${onclick?`style="cursor:pointer" onclick="__rowclick('${host}',${i})"`:''}>${cols.map(c=>{let v=r[c];const f=fmt[c];const out=f?f(v,r):(Array.isArray(v)?v.length:esc(v));const num=typeof v==='number'&&!f;return `<td class="${num?'num':''}">${out}</td>`;}).join('')}</tr>`).join('')||`<tr><td colspan="${cols.length}" class="dim" style="padding:16px">No rows.</td></tr>`}</tbody></table>`;
  el._rows=rows;el._onclick=onclick;}
function __rowclick(host,i){const el=document.getElementById(host);if(el&&el._onclick)el._onclick(el._rows[i]);}
function openDrawer(title,html){document.getElementById('dtitle').innerHTML=title;document.getElementById('dbody').innerHTML=html;document.getElementById('drawer').classList.add('open');document.getElementById('dbg').style.display='block';}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('dbg').style.display='none';}
async function openSession(file){openDrawer('loading…','<p class="dim">parsing transcript…</p>');let d;try{d=await api('/api/session?file='+encodeURIComponent(file));}catch(e){openDrawer('Error','<p class="dim">Could not load.</p>');return;}
  const mm=d.meta;openDrawer(`Session ${esc((mm.sessionId||'').slice(0,8))} <span class="chip src">${esc(mm.source||'')}</span>`,
   `<div class="kpis">${kpi(mm.events,'Events')}${kpi(mm.toolCalls,'Tools')}${kpi(mm.subagentFiles,'Sub-agents')}${kpi(fmtK(mm.tokensTotal),'Tokens')}${kpi((mm.cacheHit*100||0).toFixed(0)+'%','Cache')}</div>
   <div class="card" style="margin-bottom:10px"><h3>Tools</h3><div class="list">${(d.tools||[]).map(t=>`<div class="it"><span class="chip ${t.origin}">${esc(t.origin)}</span><span class="nm">${esc(t.name)}</span><span class="rt">${t.count}× · ${fmtK(t.tokens)} tok</span></div>`).join('')}</div></div>
   <div class="card"><h3>Timeline <span class="tag">${(d.timeline||[]).length} events</span></h3>${(d.timeline||[]).slice(0,120).map(e=>`<div class="row" style="border-bottom:1px solid var(--line);padding:5px 0;font-size:12px"><span class="dim" style="width:60px">${esc((e.ts||'').slice(11,19))}</span><span class="chip ${e.origin||'unk'}" style="width:54px;text-align:center">${esc(e.kind==='tool_use'?e.tool:e.kind)}</span><span class="muted" style="flex:1">${esc(e.summary||'')}</span>${e.status?`<span class="chip ${e.status==='ok'?'loc':'ext'}">${e.status}</span>`:''}</div>`).join('')}</div>`);}

function toggleTheme(){document.body.classList.toggle('light');render();}
setInterval(()=>{document.getElementById('clock')&&(document.getElementById('clock').textContent=new Date().toLocaleTimeString());},1000);

boot();
